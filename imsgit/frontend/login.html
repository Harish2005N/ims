<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — StockSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3/src/index.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-primary);
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--bg-surface);
      border-radius: 20px;
      border: 1px solid var(--bg-border);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .auth-container::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.5;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .auth-logo i { font-size: 36px; }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--bg-base);
      padding: 4px;
      border-radius: 12px;
      position: relative;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .auth-tab.active {
      background: var(--bg-raised);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--bg-border);
      background: var(--bg-raised);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }
    .form-group input:focus, .form-group select:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: var(--transition);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .auth-btn:hover { 
      background: var(--accent-hover); 
      transform: translateY(-1px);
    }
    .auth-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .error-box {
      background: var(--red-soft);
      color: var(--red);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid rgba(248, 81, 73, 0.2);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="ph-bold ph-warehouse"></i>
        <span>StockSense</span>
      </div>
      <p class="auth-subtitle" id="auth-subtitle">Welcome back! Please login to your account.</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>

    <div class="error-box" id="error-box"></div>

    <form id="auth-form">
      <!-- Login Fields -->
      <div id="login-fields">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="name@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
      </div>

      <!-- Register Extra Fields -->
      <div id="register-fields" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-username" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="name@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label>Register As</label>
          <select id="reg-role">
            <option value="buyer">Buyer (View Only)</option>
            <option value="seller">Seller (Manage Inventory)</option>
          </select>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="submit-btn">Login Account</button>
    </form>

    <div class="auth-footer">
      StockSense &copy; 2026 Inventory Management
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
